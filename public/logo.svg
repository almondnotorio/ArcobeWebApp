<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Arc sweep left -->
  <path d="M 60 300 Q 20 180 100 90" stroke="#1B2272" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Arc sweep right -->
  <path d="M 340 300 Q 380 180 300 90" stroke="#1B2272" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Building base platform -->
  <rect x="105" y="210" width="190" height="12" fill="#1B2272"/>

  <!-- Building columns (left to right, varying heights) -->
  <rect x="112" y="155" width="16" height="67" fill="#1B2272"/>
  <rect x="133" y="130" width="16" height="92" fill="#1B2272"/>

  <!-- Main tower center -->
  <rect x="155" y="75" width="14" height="147" fill="#1B2272"/>
  <rect x="174" y="55" width="16" height="167" fill="#1B2272"/>
  <rect x="195" y="68" width="14" height="154" fill="#1B2272"/>

  <!-- Right columns -->
  <rect x="214" y="118" width="16" height="104" fill="#1B2272"/>
  <rect x="235" y="140" width="16" height="82" fill="#1B2272"/>
  <rect x="256" y="160" width="16" height="62" fill="#1B2272"/>

  <!-- Window detail on main tower -->
  <rect x="178" y="155" width="8" height="10" fill="white"/>
  <rect x="192" y="155" width="7" height="10" fill="white"/>
  <rect x="178" y="172" width="8" height="10" fill="white"/>
  <rect x="192" y="172" width="7" height="10" fill="white"/>

  <!-- Horizontal accent lines on tower -->
  <rect x="156" y="125" width="52" height="4" fill="#1B2272" opacity="0.5"/>

  <!-- ACC text -->
  <text x="200" y="355" font-family="Arial Black, Arial, sans-serif" font-size="82" font-weight="900" fill="#1a1a1a" text-anchor="middle" letter-spacing="-2">ACC</text>

  <!-- Subtitle -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a" text-anchor="middle" letter-spacing="3">ARCOBE CONSTRUCTION</text>
</svg>
